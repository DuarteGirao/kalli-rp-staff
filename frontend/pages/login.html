<!-- frontend/pages/login.html -->
<!DOCTYPE html>
<html lang='pt'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Kalli RP Staff</title>
    <link rel='stylesheet' href='../css/style.css'>
</head>
<body class='login-page'>

<div class='login-container'>
    <div class='login-logo'>
        <div class='logo-mark'>KALLI<span style='background:linear-gradient(135deg,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text'>RP</span></div>
        <span class='logo-tag'>Staff Management System</span>
    </div>

    <div class='login-card'>
        <h2>Bem-vindo de volta</h2>
        <p class='login-desc'>Entra com as tuas credenciais de staff.</p>

        <div id='error-msg' class='error-box' style='display:none'></div>

        <div class='form-group'>
            <label for='username'>Username</label>
            <div class='input-icon-wrap'>
                <span class='field-icon'>&#128100;</span>
                <input type='text' id='username' placeholder='O teu username' autocomplete='username'>
            </div>
        </div>
        <div class='form-group' style='margin-bottom:24px'>
            <label for='password'>Password</label>
            <div class='input-icon-wrap'>
                <span class='field-icon'>&#128274;</span>
                <input type='password' id='password' placeholder='&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;' autocomplete='current-password'>
            </div>
        </div>

        <button class='btn btn-primary btn-full btn-lg' id='btn-login'>Entrar</button>
    </div>
</div>

<script src='../js/api.js'></script>
<script>
    if (localStorage.getItem('access_token')) window.location.href = 'dashboard.html';

    const btnLogin = document.getElementById('btn-login');
    const errorEl  = document.getElementById('error-msg');

    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        errorEl.style.display = 'none';

        if (!username || !password) {
            errorEl.textContent = 'Preenche todos os campos.';
            errorEl.style.display = 'block';
            return;
        }

        btnLogin.disabled = true;
        btnLogin.textContent = 'A entrar\u2026';

        try {
            const data = await Auth.login(username, password);
            if (data.access_token) {
                saveTokens(data.access_token, data.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } else {
                throw new Error(data.detail || 'Credenciais inv\u00e1lidas.');
            }
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
            btnLogin.disabled = false;
            btnLogin.textContent = 'Entrar';
        }
    }

    btnLogin.addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
</script>
</body>
</html>
